spring:
  cloud:
    gcp:
      sql:
        enabled: true
        database-name: ${USERS_DATABASE_NAME:users}
        instance-connection-name: ${CLOUD_SQL_INSTANCE}

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  grpc:
    server:
      port: ${USER_GRPC_SERVER_PORT:9092}
    client:
      channels:
        image-service:
          address: static://${IMAGE_SERVICE_HOST:image-service}:${IMAGE_GRPC_SERVICE_PORT:9095}
          negotiation-type: plaintext
        donation-service:
          address: static://${DONATION_SERVICE_HOST:donation-service}:${DONATION_GRPC_SERVICE_PORT:9093}
          negotiation-type: plaintext

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  data:
    init:
      enabled: false

logging:
  level:
    root: INFO
    com.greengrub: INFO
    org.springframework: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8082

eureka:
  client:
    enabled: false

resilience4j:
  retry:
    instances:
      userRetry:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.greengrub.usermanagement.exception.UserStorageException
      imageServiceRetry:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - com.greengrub.usermanagement.exception.ImageServiceException
      donationServiceRetry:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - com.greengrub.usermanagement.exception.DonationServiceException

  circuitbreaker:
    instances:
      userBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      imageServiceBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      donationServiceBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
