# ============================================================================
# Kubernetes Profile - Google Cloud SQL (Postgres)
# ============================================================================
spring:
  # Cloud SQL Postgres connection (private IP via Cloud SQL Auth, no public IP needed)
  cloud:
    gcp:
      sql:
        enabled: true
        database-name: ${USERS_DATABASE_NAME:users}
        instance-connection-name: ${CLOUD_SQL_INSTANCE}  # format: project:region:instance
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  #grpc
  grpc:
    server:
      port: ${USER_GRPC_SERVER_PORT:9092}
    # gRPC Client Configuration
    # ============================================================================
    # In-cluster sibling services are reachable via their k8s Service DNS name.
    client:
      channels:
        image-service:
          address: static://${IMAGE_SERVICE_HOST:image-service}:${IMAGE_GRPC_SERVICE_PORT:9095}
          negotiation-type: plaintext
        donation-service:
          address: static://${DONATION_SERVICE_HOST:donation-service}:${DONATION_GRPC_SERVICE_PORT:9092}
          negotiation-type: plaintext

  # ============================================================================

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
          time_zone: UTC

# Disable sample data initialization in production
app:
  data:
    init:
      enabled: false
  # CORS origins set in the cluster (ConfigMap/Secret). Comma-separated list,
  # e.g. https://app.greengrub.com,https://admin.greengrub.com.
  # Empty default = no Access-Control-Allow-Origin header is emitted; the
  # GCP API Gateway is the only legitimate caller in production.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# Production logging
logging:
  level:
    root: INFO
    com.greengrub.usermanagement: INFO

# ============================================================================
# Resilience4j - production thresholds
# ============================================================================
resilience4j:
  retry:
    instances:
      # Retry: Postgres transient failures (3 attempts, exponential backoff: 500ms -> 1s -> 2s)
      userRetry:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.greengrub.usermanagement.exception.UserStorageException
      imageServiceRetry:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - com.greengrub.usermanagement.exception.ImageServiceException
      donationServiceRetry:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - com.greengrub.usermanagement.exception.DonationServiceException

  circuitbreaker:
    instances:
      # Circuit Breaker: opens at 50% failure rate over 10-call window, 30s recovery wait
      userBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      # image-service breaker — kept separate from userBreaker so failures in one
      # do not trip the other.
      imageServiceBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      # donation-service breaker — separate from user/image breakers so a dead
      # donation-service can't cascade into the others.
      donationServiceBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
server:
  port: 8082
