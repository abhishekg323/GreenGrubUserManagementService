# ============================================================================
# Kubernetes Profile - Google Cloud SQL (Postgres)
# ============================================================================

spring:
  # Cloud SQL Postgres connection (private IP via Cloud SQL Auth, no public IP needed)
  cloud:
    gcp:
      sql:
        enabled: true
        database-name: ${CLOUD_SQL_DATABASE:users}
        instance-connection-name: ${CLOUD_SQL_INSTANCE}  # format: project:region:instance
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
          time_zone: UTC

# Disable sample data initialization in production
app:
  data:
    init:
      enabled: false

# Production logging
logging:
  level:
    root: INFO
    com.greengrub.usermanagement: INFO

# ============================================================================
# Resilience4j - production thresholds
# ============================================================================
resilience4j:
  retry:
    instances:
      # Retry: Postgres transient failures (3 attempts, exponential backoff: 500ms -> 1s -> 2s)
      userRetry:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.greengrub.usermanagement.exception.UserStorageException

  circuitbreaker:
    instances:
      # Circuit Breaker: opens at 50% failure rate over 10-call window, 30s recovery wait
      userBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
