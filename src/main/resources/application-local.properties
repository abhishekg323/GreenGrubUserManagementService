# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/users
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# GCP Cloud SQL (disabled locally)
spring.cloud.gcp.sql.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  com.google.cloud.spring.autoconfigure.sql.GcpCloudSqlAutoConfiguration

#  gRPC
spring.grpc.client.channels.image-service.address=static://localhost:9095
spring.grpc.client.channels.image-service.negotiation-type=plaintext
spring.grpc.client.channels.donation-service.address=static://localhost:9093
spring.grpc.client.channels.donation-service.negotiation-type=plaintext

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5773

# Logging
logging.level.com.greengrub.usermanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Data initializer
app.data.init.enabled=true

# Eureka
eureka.client.enabled=true

# Resilience4j
resilience4j.retry.instances.userRetry.max-attempts=3
resilience4j.retry.instances.userRetry.wait-duration=500ms
resilience4j.retry.instances.userRetry.enable-exponential-backoff=true
resilience4j.retry.instances.userRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.userRetry.retry-exceptions=com.greengrub.usermanagement.exception.UserStorageException

resilience4j.circuitbreaker.instances.userBreaker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.userBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.userBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.userBreaker.register-health-indicator=true

resilience4j.retry.instances.imageServiceRetry.max-attempts=2
resilience4j.retry.instances.imageServiceRetry.wait-duration=300ms
resilience4j.retry.instances.imageServiceRetry.retry-exceptions=com.greengrub.usermanagement.exception.ImageServiceException

resilience4j.circuitbreaker.instances.imageServiceBreaker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.imageServiceBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.imageServiceBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.imageServiceBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.imageServiceBreaker.register-health-indicator=true

resilience4j.retry.instances.donationServiceRetry.max-attempts=2
resilience4j.retry.instances.donationServiceRetry.wait-duration=300ms
resilience4j.retry.instances.donationServiceRetry.retry-exceptions=com.greengrub.usermanagement.exception.DonationServiceException

resilience4j.circuitbreaker.instances.donationServiceBreaker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.donationServiceBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.donationServiceBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.donationServiceBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.donationServiceBreaker.register-health-indicator=true
