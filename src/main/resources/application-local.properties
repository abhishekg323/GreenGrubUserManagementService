# ============================================================================
# Local Profile - Postgres in Docker
# ============================================================================

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/users
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Disable GCP Cloud SQL autoconfig in local profile
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,com.google.cloud.spring.autoconfigure.sql.GcpCloudSqlAutoConfiguration
spring.cloud.gcp.sql.enabled=false

# Enable sample data initialization for local development
app.data.init.enabled=true

# More verbose logging in local
logging.level.com.greengrub.usermanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================================
# Resilience4j - lighter thresholds for dev
# ============================================================================

# Retry: Postgres transient failures (3 attempts, exponential backoff: 500ms -> 1s -> 2s)
resilience4j.retry.instances.userRetry.max-attempts=3
resilience4j.retry.instances.userRetry.wait-duration=500ms
resilience4j.retry.instances.userRetry.enable-exponential-backoff=true
resilience4j.retry.instances.userRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.userRetry.retry-exceptions=com.greengrub.usermanagement.exception.UserStorageException

# Circuit Breaker: opens at 60% failure rate over 5-call window, 10s recovery wait
resilience4j.circuitbreaker.instances.userBreaker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.userBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.userBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.userBreaker.register-health-indicator=true
