# ============================================================================
# User Management Service - Main Configuration
# ============================================================================

# Server Configuration
server.port=8082

# Application Name
spring.application.name=customer-service

# ============================================================================
# Active Profile
# ============================================================================
# Available profiles:
# - local: Postgres (Docker), DataInitializer enabled, lighter resilience thresholds
# - k8s:   Google Cloud SQL Postgres, DataInitializer disabled, production thresholds
# ============================================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ============================================================================
# Sample Data Initialization
# ============================================================================
# DataInitializer creates sample users on startup. Profile-specific value overrides this.
app.data.init.enabled=${DATA_INIT_ENABLED:true}

# ============================================================================
# Spring Cloud Configuration (Optional)
# ============================================================================
# Disable Config Server (we don't run a config server in this stack)
spring.config.import=optional:configserver:
spring.cloud.config.enabled=false

# ============================================================================
# Kafka (not used by this service)
# ============================================================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ============================================================================
# gRPC Server Configuration
# ============================================================================
spring.grpc.server.port=${GRPC_PORT:9092}

# ============================================================================
# gRPC Client Configuration
# ============================================================================
# Channels are resolved by name in @GrpcChannelFactory.createChannel("<name>").
# Plaintext is fine in-cluster (mTLS is the service mesh's job). Profile
# overrides set the actual host:port for local vs k8s.
spring.grpc.client.channels.image-service.address=static://${IMAGE_SERVICE_HOST:localhost}:${IMAGE_SERVICE_PORT:9095}
spring.grpc.client.channels.image-service.negotiation-type=plaintext
spring.grpc.client.channels.donation-service.address=static://${DONATION_SERVICE_HOST:localhost}:${DONATION_SERVICE_PORT:9096}
spring.grpc.client.channels.donation-service.negotiation-type=plaintext

# ============================================================================
# Flyway
# ============================================================================
# Schema is now Flyway-managed. baseline-on-migrate lets existing local DBs
# (created by ddl-auto=update) accept V1 as a baseline rather than failing.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.greengrub.usermanagement=INFO
logging.level.org.springframework.web=INFO

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# Actuator Configuration
# ============================================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.health.circuitbreakers.enabled=true

# ============================================================================
# Server Error Configuration
# ============================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ============================================================================
# JWT Configuration
# ============================================================================
# JWTs are minted here at /signup and /login; the API Gateway validates them
# on subsequent calls. Inject the production secret via env var.
jwt.secret=${JWT_SECRET:YourVerySecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================================
# CORS
# ============================================================================
# Profile-driven. application-local.properties allows the React dev servers;
# application-k8s.yml binds this to the CORS_ALLOWED_ORIGINS env var.
# Empty default = no Access-Control-Allow-Origin header is emitted.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ============================================================================
# Swagger/OpenAPI Configuration
# ============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.theme=monokai
