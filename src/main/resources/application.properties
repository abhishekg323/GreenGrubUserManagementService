spring.application.name=customer-service
server.port=8082

# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# gRPC
spring.grpc.server.port=${GRPC_PORT:9092}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Disable Kafka (not used by this service)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Disable Config Server
spring.config.import=optional:configserver:
spring.cloud.config.enabled=false

# JWT
jwt.secret=${JWT_SECRET:YourVerySecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Data initializer
app.data.init.enabled=${DATA_INIT_ENABLED:true}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.health.circuitbreakers.enabled=true

# Error responses
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.theme=monokai

# Logging
logging.level.root=INFO
logging.level.com.greengrub.usermanagement=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
