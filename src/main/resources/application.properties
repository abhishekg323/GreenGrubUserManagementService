# ============================================================================
# User Management Service - Main Configuration
# ============================================================================

# Server Configuration
server.port=8082

# Application Name
spring.application.name=usermanagement-service

# ============================================================================
# Active Profile
# ============================================================================
# Available profiles:
# - local: Postgres (Docker), DataInitializer enabled, lighter resilience thresholds
# - k8s:   Google Cloud SQL Postgres, DataInitializer disabled, production thresholds
# ============================================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ============================================================================
# Sample Data Initialization
# ============================================================================
# DataInitializer creates sample users on startup. Profile-specific value overrides this.
app.data.init.enabled=${DATA_INIT_ENABLED:true}

# ============================================================================
# Spring Cloud Configuration (Optional)
# ============================================================================
# Disable Config Server (we don't run a config server in this stack)
spring.config.import=optional:configserver:
spring.cloud.config.enabled=false

# ============================================================================
# Kafka (not used by this service)
# ============================================================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ============================================================================
# gRPC Server Configuration
# ============================================================================
grpc.server.port=${GRPC_PORT:9091}

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.greengrub.usermanagement=INFO
logging.level.org.springframework.web=INFO

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# Actuator Configuration
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.health.circuitbreakers.enabled=true

# ============================================================================
# Server Error Configuration
# ============================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ============================================================================
# JWT Configuration
# ============================================================================
# SECURITY: Use environment variables for sensitive data in production
jwt.secret=${JWT_SECRET:YourVerySecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================================
# Swagger/OpenAPI Configuration
# ============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.theme=monokai
