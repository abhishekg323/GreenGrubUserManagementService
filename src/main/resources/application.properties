# ============================================================================
# User Management Service - Main Configuration
# ============================================================================

# Server Configuration
server.port=8082

# Application Name
spring.application.name=usermanagement-service

# ============================================================================
# Database Profile Selection
# ============================================================================
# Available profiles:
# - h2: In-memory H2 database (Development/Testing)
# - postgres: PostgreSQL database (Production)
# - mysql: MySQL database (Production - Alternative)
#
# To switch databases, change the profile or set SPRING_PROFILES_ACTIVE env var:
# Example: java -jar app.jar --spring.profiles.active=postgres
# ============================================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# ============================================================================
# Sample Data Initialization
# ============================================================================
# Set to false to disable automatic sample user creation
# DataInitializer.java is optional and can be excluded from repository
app.data.init.enabled=${DATA_INIT_ENABLED:true}

# ============================================================================
# Spring Cloud Configuration (Optional)
# ============================================================================
# Disable Config Server
spring.config.import=optional:configserver:
spring.cloud.config.enabled=false

# Disable Service Discovery
eureka.client.enabled=false

# ============================================================================
# Kafka Configuration (Optional)
# ============================================================================
# Disable Kafka
spring.kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ============================================================================
# gRPC Server Configuration
# ============================================================================
grpc.server.port=${GRPC_PORT:9091}

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.greengrub.usermanagement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# Actuator Configuration
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ============================================================================
# Server Error Configuration
# ============================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ============================================================================
# JWT Configuration
# ============================================================================
# SECURITY: Use environment variables for sensitive data in production
jwt.secret=${JWT_SECRET:YourVerySecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================================
# Swagger/OpenAPI Configuration
# ============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.theme=monokai
