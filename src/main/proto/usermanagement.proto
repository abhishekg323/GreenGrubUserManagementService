syntax = "proto3";

package com.greengrub.usermanagement;

option java_multiple_files = true;
option java_package = "com.greengrub.usermanagement.grpc";
option java_outer_classname = "UserManagementServiceProto";

// User Management service definition for inter-service gRPC communication
service UserManagementService {
  // Get user by ID
  rpc GetUser (GetUserRequest) returns (UserResponse);

  // Get user by email
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);

  // Create a new user
  rpc CreateUser (CreateUserRequest) returns (UserResponse);

  // Update existing user
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);

  // Delete user (soft delete)
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);

  // Activate user
  rpc ActivateUser (ActivateUserRequest) returns (UserResponse);

  // Deactivate user
  rpc DeactivateUser (DeactivateUserRequest) returns (UserResponse);

  // Verify user credentials (for authentication)
  rpc VerifyCredentials (VerifyCredentialsRequest) returns (VerifyCredentialsResponse);

  // List users with filters
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
}

// User role enumeration
enum UserRole {
  ROLE_UNSPECIFIED = 0;
  DONOR = 1;
  RECIPIENT = 2;
  ADMIN = 3;
}

// Request message for getting a user by ID
message GetUserRequest {
  string user_id = 1;
}

// Request message for getting a user by email
message GetUserByEmailRequest {
  string email = 1;
}

// Request message for creating a user
message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;  // Will be hashed on server side
  string phone_number = 4;
  string address = 5;
  UserRole role = 6;
}

// Request message for updating a user
message UpdateUserRequest {
  string user_id = 1;
  optional string name = 2;
  optional string email = 3;
  optional string phone_number = 4;
  optional string address = 5;
  optional UserRole role = 6;
}

// Request message for deleting a user
message DeleteUserRequest {
  string user_id = 1;
}

// Request message for activating a user
message ActivateUserRequest {
  string user_id = 1;
}

// Request message for deactivating a user
message DeactivateUserRequest {
  string user_id = 1;
}

// Request message for verifying credentials
message VerifyCredentialsRequest {
  string email = 1;
  string password = 2;
}

// Response message for credential verification
message VerifyCredentialsResponse {
  bool valid = 1;
  optional UserResponse user = 2;
  string message = 3;
}

// Request message for listing users
message ListUsersRequest {
  optional UserRole role = 1;
  optional bool is_active = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// Response message for listing users
message ListUsersResponse {
  repeated UserResponse users = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// Response message for user operations
message UserResponse {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone_number = 4;
  string address = 5;
  bool is_active = 6;
  UserRole role = 7;
  string created_at = 8;  // ISO-8601 timestamp
  string updated_at = 9;  // ISO-8601 timestamp
}

// Response message for delete operation
message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}
